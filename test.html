<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocabMaster - Milestone Test</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Load Vocab Data first -->
    <script src="script.js"></script>
</head>

<body>
    <header>
        <div class="logo"><i class="fa-solid fa-graduation-cap"></i> Milestone Test</div>
        <div class="user-profile-controls">
            <button id="themeToggle" class="icon-btn" aria-label="Toggle Dark Mode" title="Toggle Dark Mode">
                <i class="fa-solid fa-moon"></i>
            </button>
            <button id="btnDashboard" class="btn-primary" style="background: var(--text-light);"><i
                    class="fa-solid fa-house"></i> Dashboard</button>
        </div>
    </header>

    <main id="testApp">
        <!-- Loading View -->
        <section id="loadingView" class="view active-view" style="text-align: center; padding: 4rem;">
            <h2>Preparing your test...</h2>
        </section>

        <!-- Quiz View -->
        <section id="quizView" class="view hidden-view">
            <div class="quiz-header" style="text-align: center; margin-bottom: 2rem;">
                <h2 id="testTitle">Weekly Test</h2>
                <p id="testSubtitle" style="color: var(--text-light);">Days 1 - 7</p>
                <div class="progress-bar-bg" style="max-width: 600px; margin: 1rem auto; height: 10px;">
                    <div class="progress-bar" id="testProgressBar" style="width: 0%;"></div>
                </div>
                <p style="font-weight: 600;"><span id="testProgressIndicator">1 / 15</span></p>
            </div>

            <div class="quiz-card" id="testCard">
                <!-- Question injected via JS -->
            </div>

            <div class="action-buttons" style="margin-top: 1.5rem;">
                <button id="btnSubmitTestAnswer" class="btn-primary">Submit Answer</button>
                <button id="btnNextTestQuestion" class="btn-primary" style="display: none;">Next Question <i
                        class="fa-solid fa-arrow-right"></i></button>
            </div>
        </section>

        <!-- Result View -->
        <section id="resultView" class="view hidden-view">
            <div class="result-container" style="text-align: center; padding: 2rem;">
                <h1 id="resultTitle">Test Complete!</h1>
                <div id="scoreCircle" class="score-circle"
                    style="width: 150px; height: 150px; margin: 2rem auto; font-size: 2.5rem;">
                    <span id="scoreText">0%</span>
                </div>
                <h2 id="performanceLevel" style="margin-bottom: 1rem; color: var(--primary-color);"></h2>
                <div id="resultMessage" style="font-size: 1.2rem; margin-bottom: 2rem; color: var(--text-light);"></div>

                <button id="btnResultAction" class="btn-primary" style="font-size: 1.1rem; padding: 0.8rem 2rem;">Return
                    to Dashboard</button>

                <div id="reviewAnswers"
                    style="margin-top: 3rem; text-align: left; background: var(--bg-light); padding: 1.5rem; border-radius: 12px;">
                </div>
            </div>
        </section>
    </main>

    <script src="auth.js"></script>
    <script src="test.js"></script>
</body>

</html>
