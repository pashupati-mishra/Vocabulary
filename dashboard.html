<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocabMaster - Dashboard</title>
    <meta name="description" content="Your 100-day vocabulary progress.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo"><i class="fa-solid fa-book-open"></i> VocabMaster</div>
        <div class="user-profile-controls">
            <button id="themeToggle" class="icon-btn" aria-label="Toggle Dark Mode" title="Toggle Dark Mode">
                <i class="fa-solid fa-moon"></i>
            </button>
            <button id="btnLogout" class="btn-primary btn-logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
        </div>
    </header>

    <main id="app">
        <!-- Advanced Dashboard View -->
        <section id="dashboardView" class="view active-view">
            
            <!-- Gamified User Profile -->
            <div class="user-profile-banner" style="display: flex; gap: 2rem; background: var(--surface-color); padding: 2rem; border-radius: 12px; box-shadow: var(--card-shadow); margin-bottom: 2rem; align-items: center; flex-wrap: wrap;">
                <div class="level-badge" style="text-align: center;">
                    <div style="width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, var(--primary-color), #4dabf7); color: white; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; border: 4px solid var(--surface-color); box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin: 0 auto; transition: transform 0.3s;" id="levelBadgeAnim">
                        <span id="playerLevelBadge">1</span>
                    </div>
                    <div style="font-weight: 600; margin-top: 0.5rem; color: var(--primary-color);">LEVEL</div>
                </div>
                <div class="user-stats" style="flex: 1; min-width: 250px;">
                    <h1 id="userGreeting" style="margin-bottom: 0.5rem; font-size: 2rem;">Welcome, User</h1>
                    
                    <div class="xp-container" style="margin-bottom: 1.5rem;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.25rem;">
                            <span style="font-weight: 600; color: var(--text-light);">Experience (XP)</span>
                            <span id="xpText" style="font-weight: 600; color: var(--primary-color);">0 / 100 XP</span>
                        </div>
                        <div class="progress-bar-bg" style="height: 16px;">
                            <div class="progress-bar" id="xpProgressBar" style="width: 0%; background: linear-gradient(90deg, #fca311, #ffb703);"></div>
                        </div>
                    </div>

                    <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                        <div style="display: flex; align-items: center; gap: 0.5rem; background: rgba(252, 163, 17, 0.1); padding: 0.5rem 1rem; border-radius: 20px; color: var(--warning-color); font-weight: 600;">
                            <i class="fa-solid fa-fire"></i> <span id="streakCount">0 Day Streak</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 0.5rem; background: rgba(56, 176, 0, 0.1); padding: 0.5rem 1rem; border-radius: 20px; color: var(--success-color); font-weight: 600;">
                            <i class="fa-solid fa-trophy"></i> <span id="badgeCount">0 Badges Earned</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 0.5rem; background: rgba(67, 97, 238, 0.1); padding: 0.5rem 1rem; border-radius: 20px; color: var(--primary-color); font-weight: 600;">
                            <i class="fa-solid fa-calendar-check"></i> <span id="statDaysCompleted">0 Days Done</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Badges Room -->
            <div class="badges-section" style="margin-bottom: 2rem;">
                <h3><i class="fa-solid fa-award"></i> Achievement Badges</h3>
                <div class="badges-container" id="badgesContainer" style="display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem; padding: 1.5rem; background: var(--surface-color); border-radius: 12px; box-shadow: var(--card-shadow); min-height: 100px; align-items: center;">
                    <p style="color: var(--text-light); font-style: italic;" id="noBadgesText">No badges earned yet. Keep learning to unlock!</p>
                </div>
            </div>

            <div class="hero" style="padding: 1.5rem; margin-bottom: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                    <h2 style="font-size: 1.25rem;">Overall Progress</h2>
                    <span id="progressText" style="font-weight: 600; color: var(--primary-color);">0%</span>
                </div>
                <div class="progress-bar-bg" style="margin-bottom: 0;">
                    <div class="progress-bar" id="overallProgressBar" style="width: 0%;"></div>
                </div>
            </div>

            <!-- Recent Activity -->
            <div class="activity-section" style="margin-bottom: 2rem;">
                <h3><i class="fa-solid fa-clock-rotate-left"></i> Recent Activity</h3>
                <ul class="activity-list" id="recentActivityList">
                    <li class="activity-item" style="color: var(--text-light);">No activity yet. Complete your first day!</li>
                </ul>
            </div>
            
            <!-- Milestone Tests -->
            <div class="milestones-section" style="margin-bottom: 2rem;">
                <h3><i class="fa-solid fa-medal"></i> Milestone Tests</h3>
                <div class="milestones-grid" id="milestonesGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem;">
                    <!-- Dynamically populated milestone cards -->
                </div>
            </div>
            
            <h3 style="margin-bottom: 1rem; color: var(--text-color);">Learning Roadmap</h3>
            <div class="roadmap-grid" id="roadmapGrid">
                <!-- Dynamically populated day cards -->
            </div>
        </section>
    </main>

    <script src="auth.js"></script>
    <script src="gamification.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
